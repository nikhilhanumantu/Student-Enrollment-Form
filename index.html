<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enrollment Web Form | JsonPowerDB</title>
    
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <!-- Custom Glassmorphic Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center">
        <div class="glass-card">
            
            <!-- Form Title & Header -->
            <div class="form-header text-center">
                <h2><i class="bi bi-mortarboard-fill me-2 text-primary"></i>Student Enrollment Form</h2>
                <p>Register new student profiles or update existing entries powered by JsonPowerDB</p>
            </div>

            <!-- Database Configuration Section (Collapsable Settings) -->
            <div class="settings-card">
                <div class="d-flex justify-content-between align-items-center">
                    <button class="settings-toggle-btn" id="settingsToggleBtn" type="button" data-bs-toggle="collapse" data-bs-target="#settingsCollapse" aria-expanded="false" aria-controls="settingsCollapse">
                        <i class="bi bi-gear-fill text-primary"></i>
                        <span>Database Configuration Settings</span>
                    </button>
                    <span class="badge bg-warning text-dark d-none" id="tokenAlert">
                        <i class="bi bi-exclamation-triangle-fill me-1"></i>Token Required
                    </span>
                </div>
                
                <div class="collapse mt-3" id="settingsCollapse">
                    <form id="dbSettingsForm" class="row g-3">
                        <div class="col-12">
                            <label for="setConnToken" class="form-label">Connection Token</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-shield-lock-fill"></i></span>
                                <input type="text" class="form-control" id="setConnToken" placeholder="Paste your JsonPowerDB Connection Token here..." required autocomplete="off">
                            </div>
                            <div class="form-text text-muted">Obtain this token from your Login2Explore developer dashboard.</div>
                        </div>
                        <div class="col-md-4">
                            <label for="setDbName" class="form-label">Database Name</label>
                            <input type="text" class="form-control" id="setDbName" value="SCHOOL-DB" required>
                        </div>
                        <div class="col-md-4">
                            <label for="setRelName" class="form-label">Relation Name</label>
                            <input type="text" class="form-control" id="setRelName" value="STUDENT-TABLE" required>
                        </div>
                        <div class="col-md-4">
                            <label for="setBaseUrl" class="form-label">Base URL</label>
                            <input type="url" class="form-control" id="setBaseUrl" value="http://api.login2explore.com:5577" required>
                        </div>
                        <div class="col-12 text-end">
                            <button type="submit" class="btn btn-primary-gradient btn-sm">
                                <i class="bi bi-check2-circle me-1"></i>Save Configuration
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Student Enrollment Form -->
            <form id="studentForm" onsubmit="return false;">
                <div class="row g-4">
                    
                    <!-- Roll No (Primary Key) -->
                    <div class="col-md-6">
                        <label for="rollNo" class="form-label">Roll Number (Primary Key)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-card-heading"></i></span>
                            <input type="text" class="form-control" id="rollNo" placeholder="Enter student roll number" required autofocus>
                        </div>
                    </div>

                    <!-- Full Name -->
                    <div class="col-md-6">
                        <label for="fullName" class="form-label">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                            <input type="text" class="form-control" id="fullName" placeholder="Enter student full name" required>
                        </div>
                    </div>

                    <!-- Class -->
                    <div class="col-md-6">
                        <label for="studentClass" class="form-label">Class</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-journal-bookmark-fill"></i></span>
                            <input type="text" class="form-control" id="studentClass" placeholder="e.g. 10th Grade" required>
                        </div>
                    </div>

                    <!-- Birth Date -->
                    <div class="col-md-6">
                        <label for="birthDate" class="form-label">Birth Date</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-calendar-event"></i></span>
                            <input type="date" class="form-control" id="birthDate" required>
                        </div>
                    </div>

                    <!-- Address -->
                    <div class="col-12">
                        <label for="address" class="form-label">Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-house-door-fill"></i></span>
                            <textarea class="form-control" id="address" rows="3" placeholder="Enter residential address" required></textarea>
                        </div>
                    </div>

                    <!-- Enrollment Date -->
                    <div class="col-md-6">
                        <label for="enrollmentDate" class="form-label">Enrollment Date</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-calendar-check"></i></span>
                            <input type="date" class="form-control" id="enrollmentDate" required>
                        </div>
                    </div>
                </div>

                <!-- Form Controls (Action Buttons) -->
                <div class="row mt-5">
                    <div class="col-12 d-flex justify-content-between align-items-center flex-wrap gap-3">
                        <button type="button" class="btn btn-secondary-gradient" id="btnReset">
                            <i class="bi bi-arrow-counterclockwise me-1"></i>Reset
                        </button>
                        <div class="d-flex gap-3">
                            <button type="button" class="btn btn-primary-gradient" id="btnSave">
                                <i class="bi bi-floppy-fill me-1"></i>Save
                            </button>
                            <button type="button" class="btn btn-primary-gradient" id="btnUpdate">
                                <i class="bi bi-pencil-square me-1"></i>Update
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom Glass Toast Alert -->
    <div class="glass-toast" id="glassToast" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="glass-toast-icon">
            <i class="bi"></i>
        </div>
        <div class="glass-toast-content" id="toastMessage">
            Notification content placeholder.
        </div>
    </div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Bootstrap 5 Bundle JS CDN (includes Popper.js) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Form Controller Script -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
